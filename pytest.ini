[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts =
    -v
    --tb=short
    --strict-markers

# Custom markers
markers =
    unit: Unit tests for individual tools and functions
    agent: Agent behavior tests
    e2e: End-to-end workflow integration tests
    slow: Tests that are expected to take longer

# Coverage
#addopts = --cov=. --cov-report=term-missing --cov-omit=tests/*
